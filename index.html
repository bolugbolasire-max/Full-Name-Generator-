     <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Full Name Generator</title>
</head>
<body>

<div class="container">
    <h1>Full Name Generator</h1>
    <p>Enter your details below to generate your full name.</p>

    <input type="text" id="firstName" placeholder="First Name">
    <input type="text" id="middleName" placeholder="Middle Name">
    <input type="text" id="lastName" placeholder="Last Name">

    <button onclick="generateName()">Generate Full Name</button>
    <button onclick="copyName()">Copy</button>
    <button onclick="clearFields()">Clear</button>

    <div id="result"></div>
</div>
